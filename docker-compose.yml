services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devgrill
      POSTGRES_PASSWORD: devgrill
      POSTGRES_DB: devgrill
    # Host 5433 avoids conflict when another Postgres (or container) already uses 5432
    ports:
      - "5433:5432"
    volumes:
      - devgrill_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devgrill -d devgrill"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  devgrill_pg:
